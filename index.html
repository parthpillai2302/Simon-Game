<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Simon Game</h2>
    <h3>Press any key to Start the Game</h3>
    <div class="container" id="box">
        <div>
            <div class ="colors" id="red" style="background-color: rgb(233, 106, 135);"></div>
            <div class ="colors" id="blue" style="background-color: rgb(63, 113, 199);"></div>
        </div>
        <div>
            <div class ="colors" id="green" style="background-color: rgb(26, 170, 86);"></div>
            <div class ="colors" id="tellow" style="background-color: rgb(255, 144, 17);"></div>
        </div> 
    </div>
</body>
</html>
